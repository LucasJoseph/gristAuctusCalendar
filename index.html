<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Available Office</title>

  <!-- FullCalendar 6 — week view only, via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Calendar container — FullCalendar mounts here -->
  <div id="calendar"></div>

  <!-- ═══════════════════════════════════════════════════════════
       BOOKING MODAL
  ════════════════════════════════════════════════════════════ -->
  <div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
    <div class="modal">

      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <p id="modal-subtitle">Book a spot</p>
      </div>

      <div class="modal-body">

        <div class="modal-info">
          <div class="modal-info-item">📅 Date<strong id="modal-date"></strong></div>
          <div class="modal-info-item">🕐 Hours<strong id="modal-hours"></strong></div>
          <div class="modal-info-item">Period<span class="period-badge" id="modal-period"></span></div>
        </div>

        <!-- Availability summary — free and taken spots -->
        <div id="modal-availability" class="modal-availability"></div>

        <!-- Who are you? — autocomplete -->
        <div class="modal-field">
          <label for="who-input">Who are you?</label>
          <div class="autocomplete-wrapper">
            <input type="text" id="who-input" class="autocomplete-input"
              placeholder="Type a name…" autocomplete="off" spellcheck="false" />
            <ul class="autocomplete-list" id="who-list" role="listbox"></ul>
          </div>
          <input type="hidden" id="modal-who-i-am" />
        </div>

        <!-- Which spot? — unlabelled, shown inline -->
        <div class="modal-field">
          <label for="modal-whose-place">Whose spot?</label>
          <select id="modal-whose-place">
            <option value="">— Select —</option>
          </select>
        </div>

        <!-- Period selector — only shown for all-day events -->
        <div class="modal-field" id="modal-period-row" style="display:none">
          <label for="modal-period-select">Period</label>
          <select id="modal-period-select">
            <option value="All day">All day</option>
            <option value="Morning">Morning</option>
            <option value="Afternoon">Afternoon</option>
          </select>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" id="modal-confirm-btn" onclick="confirmEvent()">Confirm</button>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Grist plugin API then our app -->
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <script src="app.js"></script>

</body>
</html>
