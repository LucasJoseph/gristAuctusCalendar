# .github/workflows/deploy.yml — Grist Calendar Widget
# ─────────────────────────────────────────────────────────────────
# Deploys index.html, app.js and style.css to GitHub Pages.
# The widget will be available at:
#   https://<username>.github.io/<repo-name>/
#
# Setup (one-time):
#   Go to repo → Settings → Pages → Source → select "GitHub Actions"
# ─────────────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Serve directly from the repo root
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
