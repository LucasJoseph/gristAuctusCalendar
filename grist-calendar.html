<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grist Calendar</title>
<style>
  :root {
    --blue-50: #E6F1FB; --blue-200: #85B7EB; --blue-600: #185FA5; --blue-800: #0C447C;
    --purple-50: #EEEDFE; --purple-600: #534AB7; --purple-800: #3C3489;
    --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-200: #B4B2A9; --gray-400: #888780; --gray-600: #5F5E5A; --gray-800: #444441;
    --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;
    --coral-50: #FAECE7; --coral-600: #993C1D;
    --amber-50: #FAEEDA; --amber-600: #854F0B;
    --green-50: #EAF3DE; --green-600: #3B6D11;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f8f7f4; color: #2c2c2a; min-height: 100vh; }

  header { background: white; border-bottom: 0.5px solid var(--gray-100); padding: 14px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 17px; font-weight: 500; color: var(--gray-800); }
  .header-spacer { flex: 1; }
  .view-toggle { display: flex; border: 0.5px solid var(--gray-200); border-radius: 8px; overflow: hidden; }
  .view-toggle button { background: white; border: none; padding: 7px 16px; font-size: 13px; cursor: pointer; color: var(--gray-600); transition: background 0.15s; }
  .view-toggle button.active { background: var(--blue-600); color: white; }
  .nav-btn { background: white; border: 0.5px solid var(--gray-200); border-radius: 8px; padding: 7px 12px; cursor: pointer; font-size: 13px; color: var(--gray-600); }
  .nav-btn:hover { background: var(--gray-50); }
  #period-label { font-size: 15px; font-weight: 500; min-width: 200px; text-align: center; }
  #today-btn { background: white; border: 0.5px solid var(--gray-200); border-radius: 8px; padding: 7px 14px; cursor: pointer; font-size: 13px; color: var(--blue-600); font-weight: 500; }

  .config-panel { background: white; border-bottom: 0.5px solid var(--gray-100); padding: 12px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .config-panel label { font-size: 12px; color: var(--gray-600); white-space: nowrap; }
  .config-panel input, .config-panel select { border: 0.5px solid var(--gray-200); border-radius: 6px; padding: 5px 9px; font-size: 13px; color: var(--gray-800); background: white; }
  .config-panel input { width: 220px; }
  #load-btn { background: var(--blue-600); color: white; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; font-weight: 500; }
  #load-btn:hover { background: var(--blue-800); }
  .status { font-size: 12px; color: var(--gray-400); margin-left: auto; }

  #calendar { flex: 1; padding: 20px 24px; }

  /* Week view */
  .week-grid { display: grid; grid-template-columns: 52px repeat(7, 1fr); border: 0.5px solid var(--gray-100); border-radius: 10px; overflow: hidden; background: white; }
  .week-header { display: contents; }
  .week-header-cell { background: var(--gray-50); border-bottom: 0.5px solid var(--gray-100); padding: 10px 6px; text-align: center; font-size: 12px; color: var(--gray-600); }
  .week-header-cell.today-col { background: var(--blue-50); color: var(--blue-600); font-weight: 500; }
  .week-header-cell span.day-num { display: block; font-size: 18px; font-weight: 500; color: var(--gray-800); margin-top: 2px; }
  .week-header-cell.today-col span.day-num { color: var(--blue-600); }
  .time-col { border-right: 0.5px solid var(--gray-100); }
  .time-slot { height: 48px; border-bottom: 0.5px solid var(--gray-50); display: flex; align-items: flex-start; justify-content: flex-end; padding: 2px 6px 0 0; font-size: 11px; color: var(--gray-400); }
  .day-col { border-right: 0.5px solid var(--gray-100); position: relative; }
  .day-col:last-child { border-right: none; }
  .day-col.today-col { background: #fafcff; }
  .hour-row { height: 48px; border-bottom: 0.5px solid var(--gray-50); }
  .week-wrapper { position: relative; }
  .week-events-layer { display: grid; grid-template-columns: 52px repeat(7, 1fr); position: absolute; top: 0; left: 0; right: 0; pointer-events: none; }
  .week-events-layer-spacer { height: 56px; }
  .week-day-events { position: relative; height: 1152px; pointer-events: all; }

  /* Month view */
  .month-grid { display: grid; grid-template-columns: repeat(7,1fr); border: 0.5px solid var(--gray-100); border-radius: 10px; overflow: hidden; background: white; }
  .month-day-header { background: var(--gray-50); border-bottom: 0.5px solid var(--gray-100); padding: 8px 10px; text-align: center; font-size: 12px; color: var(--gray-600); }
  .month-cell { border-right: 0.5px solid var(--gray-100); border-bottom: 0.5px solid var(--gray-100); min-height: 110px; padding: 6px; vertical-align: top; }
  .month-cell:nth-child(7n) { border-right: none; }
  .month-cell.other-month { background: var(--gray-50); }
  .month-cell.today-cell { background: #fafcff; }
  .month-day-num { font-size: 13px; font-weight: 500; color: var(--gray-600); margin-bottom: 4px; display: inline-block; width: 24px; height: 24px; line-height: 24px; text-align: center; border-radius: 50%; }
  .month-cell.today-cell .month-day-num { background: var(--blue-600); color: white; }

  /* Events */
  .event-chip { border-radius: 4px; padding: 2px 6px; font-size: 11px; font-weight: 500; cursor: pointer; margin-bottom: 2px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: opacity 0.12s; }
  .event-chip:hover { opacity: 0.82; }
  .event-chip.color-0 { background: var(--blue-50); color: var(--blue-800); border-left: 2px solid var(--blue-600); }
  .event-chip.color-1 { background: var(--purple-50); color: var(--purple-800); border-left: 2px solid var(--purple-600); }
  .event-chip.color-2 { background: var(--teal-50); color: var(--teal-800); border-left: 2px solid var(--teal-600); }

  /* Week positioned events */
  .week-event { position: absolute; left: 2px; right: 2px; border-radius: 4px; padding: 2px 5px; font-size: 11px; font-weight: 500; cursor: pointer; overflow: hidden; transition: opacity 0.12s; border-left: 2px solid; }
  .week-event:hover { opacity: 0.82; }
  .week-event.color-0 { background: var(--blue-50); color: var(--blue-800); border-color: var(--blue-600); }
  .week-event.color-1 { background: var(--purple-50); color: var(--purple-800); border-color: var(--purple-600); }
  .week-event.color-2 { background: var(--teal-50); color: var(--teal-800); border-color: var(--teal-600); }

  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 1000; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: white; border-radius: 12px; padding: 0; width: 420px; max-width: 94vw; overflow: hidden; }
  .modal-header { padding: 18px 20px 14px; border-bottom: 0.5px solid var(--gray-100); }
  .modal-header h2 { font-size: 16px; font-weight: 500; }
  .modal-header p { font-size: 13px; color: var(--gray-600); margin-top: 4px; }
  .modal-body { padding: 16px 20px; }
  .modal-info { display: flex; gap: 18px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 0.5px solid var(--gray-100); }
  .modal-info-item { font-size: 12px; color: var(--gray-600); }
  .modal-info-item strong { display: block; font-size: 13px; color: var(--gray-800); margin-top: 2px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 12px; color: var(--gray-600); margin-bottom: 5px; }
  .modal-field select { width: 100%; border: 0.5px solid var(--gray-200); border-radius: 6px; padding: 7px 10px; font-size: 13px; color: var(--gray-800); background: white; }
  .modal-field select:focus { outline: none; border-color: var(--blue-600); }
  .period-badge { display: inline-block; background: var(--blue-50); color: var(--blue-800); border-radius: 4px; padding: 3px 10px; font-size: 12px; font-weight: 500; margin-top: 4px; }
  .modal-footer { padding: 14px 20px; border-top: 0.5px solid var(--gray-100); display: flex; gap: 10px; justify-content: flex-end; }
  .btn-primary { background: var(--blue-600); color: white; border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 500; }
  .btn-primary:hover { background: var(--blue-800); }
  .btn-secondary { background: white; color: var(--gray-600); border: 0.5px solid var(--gray-200); border-radius: 6px; padding: 8px 16px; font-size: 13px; cursor: pointer; }
  .btn-primary.loading { opacity: 0.6; pointer-events: none; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--gray-800); color: white; padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 2000; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.success { background: var(--teal-600); }
  .toast.error { background: var(--coral-600); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-400); font-size: 14px; }
</style>
</head>
<body>

<header>
  <h1>📅 Grist Calendar</h1>
  <div class="view-toggle">
    <button id="btn-week" class="active" onclick="setView('week')">Semaine</button>
    <button id="btn-month" onclick="setView('month')">Mois</button>
  </div>
  <div class="header-spacer"></div>
  <button class="nav-btn" onclick="navigate(-1)">&#8592;</button>
  <span id="period-label"></span>
  <button class="nav-btn" onclick="navigate(1)">&#8594;</button>
  <button id="today-btn" onclick="goToday()">Aujourd'hui</button>
</header>

<div class="config-panel">
  <label>URL du document Grist</label>
  <input id="grist-url" type="text" value="https://grist.numerique.gouv.fr/api/docs/cESjfoc8fpo4ZDUZ18kFHm" />
  <label>Table source (événements)</label>
  <input id="table-src" type="text" value="Calendar" style="width:140px" />
  <label>Table cible (clics)</label>
  <input id="table-dst" type="text" value="Getting_available_place" style="width:160px" />
  <label>Table personnes</label>
  <input id="table-people" type="text" value="People" style="width:120px" />
  <label>Colonne nom</label>
  <input id="col-people" type="text" value="" placeholder="auto" style="width:100px" />
  <label>Clé API</label>
  <input id="api-key" type="password" placeholder="••••••••" style="width:130px" />
  <button id="load-btn" onclick="loadEvents()">Charger</button>
  <span class="status" id="status-msg"></span>
</div>

<div id="calendar"></div>

<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <p id="modal-subtitle"></p>
    </div>
    <div class="modal-body">
      <div class="modal-info">
        <div class="modal-info-item">📅 Date<strong id="modal-date"></strong></div>
        <div class="modal-info-item">🕐 Horaire<strong id="modal-hours"></strong></div>
        <div class="modal-info-item">Période<span class="period-badge" id="modal-period"></span></div>
      </div>
      <div class="modal-field">
        <label>Qui êtes-vous ?</label>
        <select id="modal-who-i-am"><option value="">Chargement…</option></select>
      </div>
      <div class="modal-field">
        <label>Quelle place souhaitez-vous prendre ?</label>
        <select id="modal-whose-place"><option value="">—</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn-primary" id="modal-confirm-btn" onclick="confirmEvent()">Confirmer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS_FR = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

let currentView = 'week';
let currentDate = new Date();
let events = [];
let people = [];
let selectedEvent = null;
let autoRefreshTimer = null;

function setView(v) {
  currentView = v;
  document.getElementById('btn-week').classList.toggle('active', v === 'week');
  document.getElementById('btn-month').classList.toggle('active', v === 'month');
  render();
}

function navigate(dir) {
  if (currentView === 'week') {
    currentDate = new Date(currentDate.getTime() + dir * 7 * 86400000);
  } else {
    currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + dir, 1);
  }
  render();
}

function goToday() {
  currentDate = new Date();
  render();
}

function getWeekStart(d) {
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  return new Date(d.getFullYear(), d.getMonth(), d.getDate() + diff);
}

function fmtDate(d) {
  return d.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' });
}

function parseEventDate(raw) {
  if (!raw) return null;
  if (typeof raw === 'number') return new Date(raw * 1000);
  if (typeof raw === 'string') {
    const ddmmyyyy = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (ddmmyyyy) return new Date(+ddmmyyyy[3], +ddmmyyyy[2] - 1, +ddmmyyyy[1]);
    const yyyymmdd = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (yyyymmdd) return new Date(+yyyymmdd[1], +yyyymmdd[2] - 1, +yyyymmdd[3]);
    return new Date(raw);
  }
  return null;
}

function parseTime(raw) {
  if (!raw) return null;
  if (typeof raw === 'number') {
    const d = new Date(raw * 1000);
    const h = d.getHours();
    const m = d.getMinutes();
    return { h, m, str: `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}` };
  }
  if (typeof raw === 'string') {
    const hm = raw.match(/(\d{1,2}):(\d{2})/);
    if (hm) { const h = +hm[1], m = +hm[2]; return { h, m, str: `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}` }; }
  }
  return null;
}

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function isToday(d) { return isSameDay(d, new Date()); }

function getEventsForDay(d) {
  return events.filter(e => {
    const ed = parseEventDate(e._date);
    return ed && isSameDay(ed, d);
  });
}

function render() {
  if (currentView === 'week') renderWeek();
  else renderMonth();
}

function renderWeek() {
  const ws = getWeekStart(currentDate);
  const we = new Date(ws.getTime() + 6 * 86400000);
  document.getElementById('period-label').textContent =
    `${ws.getDate()} ${MONTHS_FR[ws.getMonth()].slice(0,4)}. – ${we.getDate()} ${MONTHS_FR[we.getMonth()].slice(0,4)}. ${we.getFullYear()}`;

  const days = Array.from({length:7}, (_,i) => new Date(ws.getTime() + i * 86400000));
  let html = `<div class="week-wrapper"><div class="week-grid">`;
  html += `<div class="week-header-cell time-col"></div>`;
  days.forEach((d,i) => {
    const tod = isToday(d);
    html += `<div class="week-header-cell${tod?' today-col':''}">
      <span>${DAYS_FR[i]}</span>
      <span class="day-num">${d.getDate()}</span>
    </div>`;
  });

  for (let h = 0; h < 24; h++) {
    html += `<div class="time-col"><div class="time-slot">${h > 0 ? String(h).padStart(2,'0')+'h' : ''}</div></div>`;
    days.forEach(d => {
      const tod = isToday(d);
      html += `<div class="day-col${tod?' today-col':''}" data-date="${d.toISOString().slice(0,10)}" data-hour="${h}">
        <div class="hour-row"></div>
      </div>`;
    });
  }
  html += `</div>`;

  // Events overlay: absolutely positioned over the grid, spacer skips the header row
  html += `<div class="week-events-layer"><div style="width:52px"><div class="week-events-layer-spacer"></div></div>`;
  days.forEach((d, i) => {
    html += `<div><div class="week-events-layer-spacer"></div><div class="week-day-events" data-dayidx="${i}"></div></div>`;
  });
  html += `</div></div>`;

  document.getElementById('calendar').innerHTML = html;

  // Sync spacer height to actual rendered header height
  requestAnimationFrame(() => {
    const headerCell = document.querySelector('.week-header-cell');
    if (headerCell) {
      const h = headerCell.offsetHeight;
      document.querySelectorAll('.week-events-layer-spacer').forEach(el => el.style.height = h + 'px');
    }
  });

  function overlaps(a, b) {
    return a.top < b.top + b.height && b.top < a.top + a.height;
  }

  days.forEach((day, dayIdx) => {
    const container = document.querySelector(`.week-day-events[data-dayidx="${dayIdx}"]`);
    if (!container) return;

    const dayEvs = events.map((ev, i) => ({ ev, i })).filter(({ ev }) => {
      const ed = parseEventDate(ev._date);
      return ed && isSameDay(ed, day);
    });
    if (!dayEvs.length) return;

    const parsed = dayEvs.map(({ ev, i }) => {
      const st = parseTime(ev._start);
      const en = parseTime(ev._end);
      if (!st) return null;
      const top = (st.h + st.m / 60) * 48;
      const height = en ? Math.max((en.h - st.h + (en.m - st.m) / 60) * 48, 20) : 48;
      return { ev, i, st, en, top, height, _col: 0, _totalCols: 1 };
    }).filter(Boolean);

    parsed.forEach((item, idx) => {
      const concurrent = parsed.filter((other, j) => j !== idx && overlaps(other, item));
      item._totalCols = concurrent.length + 1;
      item._col = 0;
      for (let c = 0; c < item._totalCols; c++) {
        if (!concurrent.some(o => o._col === c)) { item._col = c; break; }
      }
    });

    parsed.forEach(item => {
      const chip = document.createElement('div');
      chip.className = `week-event color-${item.i % 3}`;
      chip.style.position = 'absolute';
      chip.style.top = item.top + 'px';
      chip.style.height = item.height + 'px';
      const pct = 100 / item._totalCols;
      chip.style.left = (item._col * pct) + '%';
      chip.style.width = `calc(${pct}% - 4px)`;
      chip.style.cursor = 'pointer';
      chip.textContent = item.ev._text || '(sans titre)';
      chip.title = `${item.ev._text} — ${item.st.str}${item.en ? ' → ' + item.en.str : ''}`;
      chip.addEventListener('click', (e) => { e.stopPropagation(); openModal(item.ev); });
      container.appendChild(chip);
    });
  });
}

function renderMonth() {
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  document.getElementById('period-label').textContent = `${MONTHS_FR[m]} ${y}`;

  const firstDay = new Date(y, m, 1);
  const lastDay = new Date(y, m + 1, 0);
  let startDow = firstDay.getDay();
  if (startDow === 0) startDow = 7;
  const gridStart = new Date(firstDay.getTime() - (startDow - 1) * 86400000);

  let html = `<div class="month-grid">`;
  DAYS_FR.forEach(d => html += `<div class="month-day-header">${d}</div>`);

  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart.getTime() + i * 86400000);
    const isOther = d.getMonth() !== m;
    const tod = isToday(d);
    const dayEvents = getEventsForDay(d);
    html += `<div class="month-cell${isOther?' other-month':''}${tod?' today-cell':''}">
      <span class="month-day-num">${d.getDate()}</span>`;
    dayEvents.forEach((ev, idx) => {
      const st = parseTime(ev._start);
      html += `<span class="event-chip color-${idx % 3}" data-evid="${ev._id}" title="${ev._text}">
        ${st ? st.str + ' ' : ''}${ev._text || '(sans titre)'}
      </span>`;
    });
    html += `</div>`;
  }
  html += `</div>`;
  document.getElementById('calendar').innerHTML = html;

  document.querySelectorAll('.event-chip[data-evid]').forEach(el => {
    el.addEventListener('click', () => {
      const ev = events.find(e => e._id == el.dataset.evid);
      if (ev) openModal(ev);
    });
  });
}

function getPeriod(ev) {
  const st = parseTime(ev._start);
  const en = parseTime(ev._end);
  if (!st) return 'Inconnu';
  if (st.h <= 8 && en && en.h >= 18) return 'Journée entière';
  if (en && en.h <= 12) return 'Morning';
  if (st.h >= 12) return 'Afternoon';
  return 'Journée entière';
}

function parseAvailablePlaces(text) {
  if (!text) return [];
  const lines = text.split('\n');
  const names = [];
  for (const line of lines) {
    const parts = line.split(',');
    for (const part of parts) {
      const name = part.trim().replace(/^-\s*/, '');
      if (name && !/places?:/i.test(name) && !/^\d+/.test(name)) names.push(name);
    }
  }
  return names;
}

function openModal(ev) {
  selectedEvent = ev;
  const ed = parseEventDate(ev._date);
  const st = parseTime(ev._start);
  const en = parseTime(ev._end);
  const period = getPeriod(ev);

  document.getElementById('modal-title').textContent = ev._text || '(sans titre)';
  document.getElementById('modal-subtitle').textContent = 'Réserver une place';
  document.getElementById('modal-date').textContent = ed ? fmtDate(ed) : '—';
  document.getElementById('modal-hours').textContent = st ? (st.str + (en ? ' → ' + en.str : '')) : '—';
  document.getElementById('modal-period').textContent = period;

  const whoSelect = document.getElementById('modal-who-i-am');
  whoSelect.innerHTML = '<option value="">— Choisissez —</option>';
  people.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = p;
    whoSelect.appendChild(opt);
  });

  const places = parseAvailablePlaces(ev._text);
  const placeSelect = document.getElementById('modal-whose-place');
  placeSelect.innerHTML = '<option value="">— Choisissez —</option>';
  places.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    placeSelect.appendChild(opt);
  });

  document.getElementById('modal-bg').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-bg')) {
    document.getElementById('modal-bg').classList.remove('open');
    selectedEvent = null;
  }
}

async function confirmEvent() {
  if (!selectedEvent) return;
  const whoIAm = document.getElementById('modal-who-i-am').value;
  const whosePlace = document.getElementById('modal-whose-place').value;
  if (!whoIAm) { showToast('Veuillez choisir qui vous êtes', 'error'); return; }
  if (!whosePlace) { showToast('Veuillez choisir une place', 'error'); return; }

  const btn = document.getElementById('modal-confirm-btn');
  btn.classList.add('loading');
  btn.textContent = 'Envoi…';

  const apiKey = document.getElementById('api-key').value.trim();
  const gristUrl = document.getElementById('grist-url').value.trim();
  const tableDst = document.getElementById('table-dst').value.trim() || 'Getting_available_place';
  const baseUrl = gristUrl.replace(/\/$/, '');
  const url = `${baseUrl}/tables/${tableDst}/records`;

  const ed = parseEventDate(selectedEvent._date);
  const period = getPeriod(selectedEvent);

  const record = {
    records: [{
      fields: {
        date: ed ? ed.toISOString().slice(0, 10) : '',
        people_available_place: whosePlace,
        people_taking_the_place: whoIAm,
        Period: period
      }
    }]
  };

  try {
    const headers = { 'Content-Type': 'application/json' };
    if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`;
    const resp = await fetch(url, { method: 'POST', headers, body: JSON.stringify(record) });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    showToast('Place réservée !', 'success');
    document.getElementById('modal-bg').classList.remove('open');
  } catch (err) {
    showToast('Erreur : ' + err.message, 'error');
  }
  btn.classList.remove('loading');
  btn.textContent = 'Confirmer';
}

function extractDocId(url) {
  const m = url.match(/\/docs\/([a-zA-Z0-9_-]+)/);
  if (m) return m[1];
  const m2 = url.match(/\/doc\/([a-zA-Z0-9_-]+)/);
  return m2 ? m2[1] : null;
}

function extractApiBase(url) {
  const m = url.match(/^(https?:\/\/[^/]+\/o\/[^/]+\/api)/);
  if (m) return m[1];
  try { const u = new URL(url); return u.origin + '/o/auctus/api'; } catch { return 'https://grist.numerique.gouv.fr/o/auctus/api'; }
}

async function fetchPeople(baseUrl, headers) {
  const tablePeople = document.getElementById('table-people').value.trim() || 'People';
  const colPeople = document.getElementById('col-people').value.trim();
  try {
    const resp = await fetch(`${baseUrl}/tables/${tablePeople}/records`, { headers });
    if (!resp.ok) {
      document.getElementById('status-msg').textContent = `✗ Table personnes "${tablePeople}" introuvable (${resp.status})`;
      return;
    }
    const data = await resp.json();
    people = (data.records || []).map(r => {
      const fields = r.fields;
      let nameCol = colPeople;
      if (!nameCol) {
        nameCol = Object.keys(fields).find(k => k !== 'manualSort' && typeof fields[k] === 'string' && fields[k].trim() !== '')
          || Object.keys(fields).find(k => k !== 'manualSort');
      }
      return nameCol ? String(fields[nameCol] || '').trim() : '';
    }).filter(Boolean);
    console.log(`people loaded from "${tablePeople}":`, people);
  } catch(e) { console.warn('people fetch failed', e); }
}

async function loadEvents(silent = false) {
  const apiKey = document.getElementById('api-key').value.trim();
  const gristUrl = document.getElementById('grist-url').value.trim();
  const tableSrc = document.getElementById('table-src').value.trim() || 'Calendar';
  const status = document.getElementById('status-msg');

  const baseUrl = gristUrl.replace(/\/$/, '');
  const url = `${baseUrl}/tables/${tableSrc}/records`;

  if (!silent) {
    status.textContent = 'Chargement…';
    document.getElementById('load-btn').disabled = true;
  }

  try {
    const headers = {};
    if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`;

    const [resp] = await Promise.all([
      fetch(url, { headers }),
      fetchPeople(baseUrl, headers)
    ]);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    events = (data.records || []).map(r => {
      const fields = r.fields;
      return {
        _id: r.id,
        _date: fields['date'] ?? null,
        _text: fields['calendar_text'] ?? '',
        _start: fields['start'] ?? null,
        _end: fields['end'] ?? null,
        _raw: fields
      };
    }).filter(e => e._text && e._text.trim() !== '');

    const now = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    status.textContent = `✓ ${events.length} événement(s) — màj ${now}`;
    render();

    if (!autoRefreshTimer) {
      autoRefreshTimer = setInterval(() => loadEvents(true), 5000);
    }
  } catch (err) {
    if (!silent) status.textContent = '✗ ' + err.message;
  }
  if (!silent) document.getElementById('load-btn').disabled = false;
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => t.className = 'toast', 2800);
}

render();
</script>
